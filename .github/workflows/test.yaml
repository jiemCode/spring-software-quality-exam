name: AssurApp | Maven Tests and Reports

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build
      run: ./mvnw clean compile

    - name: Test
      run: ./mvnw clean test

    - name: Verify
      run: ./mvnw verify

    - name: Set short SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT


    - name: Coverage Report (JaCoCo)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report-${{ steps.vars.outputs.sha_short }}
        path: target/site/jacoco/
